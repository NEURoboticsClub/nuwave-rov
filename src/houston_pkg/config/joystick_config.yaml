# Joystick Configuration
# Use joystick_identify node to figure out which axis does what

# strafe, drive_forward, yaw, pitch, up, down

# https://docs.ros.org/en/humble/p/joy/

thruster_control:
  - axis: "strafe"
    input: 0
    invert: false
    sensitivity: 1
    scale: "linear"

  - axis: "drive_forward"
    input: 1            # num# of analog input. Find out from tuner node
    invert: false       # to invert the axis
    sensitivity: 1      # more = more sensitive. keep it > 0
    scale: "linear"     # one of linear, logarithmic

  - axis: "yaw"
    input: 3
    invert: false
    sensitivity: 1
    scale: "linear"
  
  - axis: "pitch"
    input: 4
    invert: false
    sensitivity: 1
    scale: "linear"

  - axis: "up"
    input: 2
    invert: false
    sensitivity: 1
    scale: "linear"

  - axis: "down"
    input: 5
    invert: false
    sensitivity: 1
    scale: "linear"
  
  - button: "A"
    input: 1
    invert: false

  - button: "roll_left"
    input: 9
    invert: false

  - button: "roll_right"
    input: 10
    invert: false


arm_control:
  - axis: "arm_axis_1" # Base rotate left right
    input: 3
    invert: false
    sensitivity: 1
    scale: "linear"

  - axis: "arm_axis_2" # Base up and down
    input: 4
    invert: false
    sensitivity: 1
    scale: "linear"

  - axis: "arm_axis_3" # Elbow
    input: 1
    invert: false
    sensitivity: 1
    scale: "linear"

  - axis: "arm_axis_4" # Wrist Rotation
    input: 0
    invert: false
    sensitivity: 1
    scale: "linear"

  - button: "wrist_up" # Wrist up
    input: 4
    invert: false

  - button: "wrist_down" # Wrist down
    input: 5
    invert: false

  - axis: "arm_axis_5" # Claw open
    input: 2
    invert: false
    sensitivity: 1
    scale: "linear"

  - axis: "arm_axis_6" # Claw close
    input: 5
    invert: false
    sensitivity: 1
    scale: "linear"