# Position and direction of each thruster on the ROV
# - Direction is a unit vector indicating the force vector applied to the ROV when the motor is active
# - Position is the location of the thruster relative to the ROV's center of mass, in meters

# IMPORTANT!!!
#   Ensure that the min_us and max_us are properly adjusted for to account for the found neutral offsets
#   It is not automatic!

motors:
  - id: 1
    name: front_left_lateral
    precision_min_us: 1430
    precision_max_us: 1630
    speed_min_us: 1430
    speed_max_us: 1630
    neutral_us: 1530
    channel: 2
    topic: "/thruster/thruster_fll"
    slew_us_per_s: 750.0

