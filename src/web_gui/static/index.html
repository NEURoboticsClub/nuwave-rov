<!DOCTYPE html>
<html>
  <head>
    <title>ROV Dashboard</title>
    <link rel="stylesheet" href="static/style.css">
    <script type="importmap">
      {
        "imports": {
          "three": "/static/vendor/three/three.module.js"
        }
      }
    </script>
  </head>

  <body>
    <main id="dashboard" class="dashboard"></main>

    <script type="module">
      const params = new URLSearchParams(window.location.search);

      // ?cams loads the minimal cameras-only view instead of the full dashboard
      if (params.has('cams')) {
        const camsScript = document.createElement('script');
        camsScript.src = 'static/cams.js';
        document.body.appendChild(camsScript);
      } else {

      // Try to load three.js for 3D model support, prevent crashing the entire dashboard
      try {
        const THREE = await import('three');
        const { GLTFLoader } = await import('/static/vendor/three/loaders/GLTFLoader.js');

        window.THREE = THREE;
        window.THREE_GLTFLoader = GLTFLoader;
      } catch (error) {
        console.warn('three.js failed to load; 3D model panel will be disabled.', error);
      }

      await new Promise((resolve, reject) => {
        const dashboardScript = document.createElement('script');
        dashboardScript.src = 'static/build_dashboard.js';
        dashboardScript.onload = resolve;
        dashboardScript.onerror = reject;
        document.body.appendChild(dashboardScript);
      });

      const isPartyMode = params.has('partymode');
      const isTestMode = params.has('test')|| isPartyMode;
      const wsScriptPath = isTestMode ? 'static/test_script.js' : 'static/script.js';

      if (isPartyMode) {
        document.body.classList.add('test-mode');
      }

      const wsScript = document.createElement('script');
      wsScript.src = wsScriptPath;
      wsScript.onload = () => {
        const handlerScript = document.createElement('script');
        handlerScript.src = 'static/ros_message_handler.js';
        document.body.appendChild(handlerScript);
      };

      document.body.appendChild(wsScript);

      }
    </script>
  </body>
</html>
